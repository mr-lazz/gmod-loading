<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Murder UWU</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
    --red:      #c0392b;
    --red-dark: #7b1010;
    --red-glow: rgba(192,57,43,0.35);
    --bg:       #060606;
    --bg2:      #0d0d0d;
    --text:     #d0d0d0;
    --muted:    #383838;
    --mono:     'Share Tech Mono', monospace;
    --display:  'Bebas Neue', sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    user-select: none;
    cursor: default;
}

/* ── FONDO RUIDO ── */
body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    background-size: 180px;
    opacity: 0.4;
    pointer-events: none;
    z-index: 0;
}

/* ── VIÑETA ── */
body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.85) 100%);
    pointer-events: none;
    z-index: 0;
}

/* ── SANGRE QUE CAE ── */
.drops {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
}

.drop {
    position: absolute;
    top: -60px;
    width: 2px;
    border-radius: 0 0 50% 50%;
    background: linear-gradient(to bottom, #8b0000, #c0392b);
    opacity: 0;
    animation: drip linear infinite;
}

@keyframes drip {
    0%   { transform: translateY(0);     opacity: 0; }
    5%   { opacity: 0.7; }
    80%  { opacity: 0.5; }
    100% { transform: translateY(110vh); opacity: 0; }
}

/* ── LÍNEAS ESCANEADO ── */
.scanlines {
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
        to bottom,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 2;
}

/* ── CONTENEDOR PRINCIPAL ── */
.container {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    text-align: center;
    width: 900px;
}

/* ── TÍTULO ── */
.title-block {
    margin-bottom: 6px;
}

.title-uwu {
    font-family: var(--display);
    font-size: 220px;
    line-height: 0.85;
    color: var(--red);
    letter-spacing: 12px;
    text-shadow:
        0 0 50px rgba(192,57,43,0.45),
        0 0 120px rgba(192,57,43,0.25);
    animation: flicker 6s ease-in-out infinite;
}

@keyframes flicker {
    0%,95%,100% { opacity: 1; }
    96%          { opacity: 0.7; }
    97%          { opacity: 1; }
    98%          { opacity: 0.5; }
    99%          { opacity: 0.9; }
}
    
.title-murder {
    font-family: var(--display);
    font-size: 78px;
    letter-spacing: 22px;
    color: #9a9a9a;
    text-transform: uppercase;
    margin-top: -12px;
}

.skull {
    font-size: 30px;
    margin: 0 12px;
    opacity: 0.7;
    animation: pulse-skull 2s ease-in-out infinite;
}

@keyframes pulse-skull {
    0%,100% { opacity: 0.4; transform: scale(1); }
    50%      { opacity: 0.9; transform: scale(1.15); }
}

/* ── TAGLINE ── */
.tagline {
    font-size: 18px;
    letter-spacing: 7px;
    color: #666;
    text-transform: uppercase;
    margin: 24px 0 34px;
}

/* ── DIVISOR ── */
.divider {
    width: 100%;
    height: 2px;
    background: linear-gradient(to right, transparent, var(--red-dark), transparent);
    margin-bottom: 34px;
}

/* ── BARRA ── */
.bar-wrapper {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
}

.status-text {
    font-size: 18px;
    letter-spacing: 5px;
    color: #777;
    text-transform: uppercase;
    min-height: 22px;
    transition: opacity 0.3s;
}

.bar-track {
    width: 100%;
    height: 2px;
    background: #111;
    position: relative;
    overflow: hidden;
}

.bar-fill {
    position: absolute;
    top: 0; left: 0;
    height: 100%;
    width: 0%;
    background: var(--red);
    box-shadow: 0 0 8px var(--red-glow);
    transition: width 0.3s ease;
}

.bar-shimmer {
    position: absolute;
    top: 0; left: -100%;
    height: 100%;
    width: 50%;
    background: linear-gradient(to right, transparent, rgba(255,100,80,0.4), transparent);
    animation: shimmer 2s ease-in-out infinite;
}

@keyframes shimmer { to { left: 200%; } }

.bar-row {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.bar-percent {
    font-size: 16px;
    letter-spacing: 3px;
    color: #777;
}

.bar-label {
    font-size: 16px;
    letter-spacing: 3px;
    color: #555;
}

/* ── MÚSICA ── */
.music-row {
    display: flex;
    align-items: center;
    gap: 14px;
    opacity: 0;
    transition: opacity 1s;
    margin-bottom: 28px;
}

.music-row.visible { opacity: 1; }

.music-bars {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    height: 22px;
}

.mbar {
    width: 2px;
    background: var(--red-dark);
    border-radius: 1px;
    animation: mbounce 0.7s ease-in-out infinite alternate;
}

.mbar:nth-child(1) { height: 5px;  animation-delay: 0s; }
.mbar:nth-child(2) { height: 11px; animation-delay: 0.12s; }
.mbar:nth-child(3) { height: 7px;  animation-delay: 0.28s; }
.mbar:nth-child(4) { height: 13px; animation-delay: 0.08s; }
.mbar:nth-child(5) { height: 4px;  animation-delay: 0.22s; }

@keyframes mbounce {
    from { transform: scaleY(0.2); }
    to   { transform: scaleY(1); }
}

.music-label {
    font-size: 16px;
    letter-spacing: 4px;
    color: #555;
    text-transform: uppercase;
}

/* ── TIP ── */
.tip-box {
    width: 100%;
    border-left: 4px solid var(--red-dark);
    padding: 18px 20px;
    background: rgba(192,57,43,0.06);
    text-align: left;
    min-height: 90px;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.tip-label {
    font-size: 14px;
    letter-spacing: 5px;
    color: #c0392b;
    text-transform: uppercase;
}

.tip-text {
    font-size: 14px;
    letter-spacing: 1px;
    color: #8a8a8a;
    line-height: 1.5;
    transition: opacity 0.5s;
}

/* ── FOOTER ── */
.footer {
    position: fixed;
    bottom: 28px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 16px;
    color: #444;
    letter-spacing: 4px;
    text-transform: uppercase;
    z-index: 10;
}
</style>
</head>
<body>

<div class="drops" id="drops"></div>
<div class="scanlines"></div>

<div class="container">

    <div class="title-block">
        <div class="title-uwu">UWU</div>
        <div class="title-murder">
            <span class="skull">💀</span>
            MURDER
            <span class="skull">💀</span>
        </div>
    </div>

    <div class="tagline">Prepárense para SER VIOLADOS, MALAYAS 🗿</div>

    <div class="divider"></div>

    <div class="bar-wrapper">
        <div class="status-text" id="status">Conectando...</div>
        <div class="bar-track">
            <div class="bar-fill" id="bar"></div>
            <div class="bar-shimmer"></div>
        </div>
        <div class="bar-row">
            <div class="bar-label" id="mapname">cargando mapa...</div>
            <div class="bar-percent" id="percent">0%</div>
        </div>
    </div>

    <div class="music-row" id="musicRow">
        <div class="music-bars">
            <div class="mbar"></div>
            <div class="mbar"></div>
            <div class="mbar"></div>
            <div class="mbar"></div>
            <div class="mbar"></div>
        </div>
        <span class="music-label" id="musicLabel">reproduciendo</span>
    </div>

    <div class="tip-box">
        <div class="tip-label">// consejo</div>
        <div class="tip-text" id="tipText">Cargando...</div>
    </div>

</div>

<div class="footer">
    <span>💀</span>
    <span>murderuwu</span>
    <span>💀</span>
</div>

<audio id="bgmusic" preload="auto"></audio>

<script>
// ── GOTAS DE SANGRE ──
var dropsEl = document.getElementById('drops');
for (var i = 0; i < 18; i++) {
    var d = document.createElement('div');
    d.className = 'drop';
    d.style.left            = (Math.random() * 100) + '%';
    d.style.height          = (20 + Math.random() * 50) + 'px';
    d.style.animationDuration = (4 + Math.random() * 10) + 's';
    d.style.animationDelay  = (Math.random() * 12) + 's';
    d.style.opacity         = 0;
    dropsEl.appendChild(d);
}

// ── MÚSICA RANDOM ──
var songs = [
    { file: "que_es_la_vida_2007_vibes.mp3",    label: "que es la vida — 2007 vibes" },
    { file: "moza_moza_2010_vibes.mp3",          label: "moza moza — 2010 vibes"      },
    { file: "padre_nuestro_dross_2013.mp3",       label: "padre nuestro — dross 2013"  },
    { file: "por_que_no_2007_vibes.mp3",          label: "por que no — 2007 vibes"     },
    { file: "dota_2008_vibes.mp3",                label: "dota — 2008 vibes"           }
];

var audio       = document.getElementById('bgmusic');
var musicRow    = document.getElementById('musicRow');
var musicLabel  = document.getElementById('musicLabel');
var currentIdx  = -1;
var songTimer   = null;
var SONG_MS     = 70000; // 1:10
var FADE_MS     = 2000;

function randomSong() {
    var idx;
    do { idx = Math.floor(Math.random() * songs.length); }
    while (idx === currentIdx);
    currentIdx = idx;
    return songs[idx];
}

function fadeTo(target, ms, cb) {
    var start = audio.volume;
    var steps = 40;
    var dt    = ms / steps;
    var dv    = (target - start) / steps;
    var n     = 0;
    var iv    = setInterval(function() {
        n++;
        audio.volume = Math.min(1, Math.max(0, start + dv * n));
        if (n >= steps) {
            clearInterval(iv);
            if (cb) cb();
        }
    }, dt);
}

function playSong() {
    var s = randomSong();
    audio.src = s.file;
    audio.volume = 0;
    audio.play().then(function() {
        musicRow.classList.add('visible');
        musicLabel.textContent = s.label;
        fadeTo(0.55, FADE_MS);
        if (songTimer) clearTimeout(songTimer);
        songTimer = setTimeout(function() {
            fadeTo(0, FADE_MS, function() { playSong(); });
        }, SONG_MS);
    }).catch(function() {
        document.addEventListener('click', function() { playSong(); }, { once: true });
    });
}

window.addEventListener('load', function() { setTimeout(playSong, 600); });

// ── TIPS ──
var tips = [
    "El asesino puede agarrar a un inocente como escudo humano — presiona H cerca de alguien. El rehén puede escapar presionando A o D rápido.",
    "El asesino puede recoger hasta 4 objetos sin delatarse. ¡Al 5to te descubren! Ojo con cuántos agarras.",
    "El primero en recoger 5 objetos recibe la Magnum. Con ella podés matar a cualquiera — incluso al asesino.",
    "Si los 15 objetos se agotan y nadie llegó a 5... Dios nos ha abandonado. Suerte encontrándose en la oscuridad.",
    "El asesino puede disfrazarse de un cadáver presionando E cerca del ragdoll. Necesita al menos 1 objeto recogido.",
    "Los inocentes ganan si el timer llega a 0. El asesino tiene que actuar rápido o será delatado por la niebla.",
    "Si ves en el tablero que alguien tiene 5 objetos pero nunca sacó la Magnum... ya sabés quién es el asesino.",
    "Cuando morís te quedás de espectador con música de Silent Hill. Si te molesta podés bajarla en Opciones → Audio.",
    "La linterna dura solo 1 minuto. Usala con cuidado — quedarte a oscuras con el asesino cerca no es buena idea.",
    "El asesino corre más rápido que los inocentes. No te alejés demasiado del grupo si no tenés la Magnum."
];

var tipEl      = document.getElementById('tipText');
var tipIdx     = Math.floor(Math.random() * tips.length);
var TIP_MS     = 7000;

function showTip() {
    tipEl.style.opacity = 0;
    setTimeout(function() {
        tipIdx = (tipIdx + 1) % tips.length;
        tipEl.textContent = tips[tipIdx];
        tipEl.style.opacity = 1;
    }, 500);
}

tipEl.textContent = tips[tipIdx];
tipEl.style.opacity = 1;
setInterval(showTip, TIP_MS);

// ── BARRA DE PROGRESO ──
var statusEl = document.getElementById('status');
var barEl    = document.getElementById('bar');
var percentEl= document.getElementById('percent');
var mapEl    = document.getElementById('mapname');

var statuses = [
    "Conectando...",
    "Descargando archivos...",
    "Cargando mapa...",
    "Iniciando gamemode...",
    "Casi listo..."
];

var currentStatus = 0;
var progress      = 0;

function updateProgress() {
    if (typeof loadingprogress !== 'undefined') {
        progress = Math.round(loadingprogress * 100);
    } else {
        progress = Math.min(progress + Math.random() * 2.5, 95);
    }

    barEl.style.width     = progress + '%';
    percentEl.textContent = Math.round(progress) + '%';

    var idx = Math.min(Math.floor((progress / 100) * statuses.length), statuses.length - 1);
    if (idx !== currentStatus) {
        currentStatus         = idx;
        statusEl.textContent  = statuses[idx];
    }

    setTimeout(updateProgress, 400);
}

updateProgress();

// ── INFO DEL SERVIDOR ──
function GameDetails(servername, serverurl, mapname, maxplayers, steamid, gamemode) {
    if (mapname) mapEl.textContent = '📍 ' + mapname;
}
</script>
</body>
</html>
